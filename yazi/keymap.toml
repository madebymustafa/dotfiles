# =============================================================================
#  Yazi — keybindings (defaults shown for reference)
#  Generated by Yazi. Edit to override defaults.
#  See: https://yazi-rs.github.io/docs/configuration/keymap
# =============================================================================

[manager]
keymap = [
	{ on = "<Esc>", run = "escape",             desc = "Exit visual/selection mode" },
	{ on = "q",     run = "quit",               desc = "Quit" },
	{ on = "Q",     run = "quit --no-cwd-file", desc = "Quit (no cwd)" },
	{ on = "<C-c>", run = "close",              desc = "Close tab / quit" },
	{ on = "<C-z>", run = "suspend",            desc = "Suspend process" },

	{ on = "k", run = "arrow prev", desc = "Previous file" },
	{ on = "j", run = "arrow next", desc = "Next file" },
	{ on = "<C-u>", run = "arrow -50%",  desc = "Up half page" },
	{ on = "<C-d>", run = "arrow 50%",   desc = "Down half page" },
	{ on = "<C-b>", run = "arrow -100%", desc = "Up one page" },
	{ on = "<C-f>", run = "arrow 100%",  desc = "Down one page" },
	{ on = [ "g", "g" ], run = "arrow top", desc = "Go to top" },
	{ on = "G",          run = "arrow bot", desc = "Go to bottom" },

	{ on = "h",      run = "leave",         desc = "Parent directory" },
	{ on = "l",      run = "enter",         desc = "Enter child directory" },
	{ on = "H",      run = "back",          desc = "Previous directory" },
	{ on = "L",      run = "forward",       desc = "Next directory" },

	{ on = "<Space>",   run = [ "toggle", "arrow next" ], desc = "Toggle selection" },
	{ on = "<C-a>",     run = "toggle_all --state=on",    desc = "Select all" },
	{ on = "<C-r>",     run = "toggle_all",               desc = "Invert selection" },
	{ on = "v", run = "visual_mode",         desc = "Visual mode" },
	{ on = "V", run = "visual_mode --unset", desc = "Visual mode (unset)" },

	{ on = "K", run = "seek -5", desc = "Preview up" },
	{ on = "J", run = "seek 5",  desc = "Preview down" },
	{ on = "<Tab>", run = "spot", desc = "Spot hovered file" },

	{ on = "o",       run = "open",                        desc = "Open" },
	{ on = "<Enter>", run = "open",                        desc = "Open" },
	{ on = "y", run = "yank",     desc = "Copy" },
	{ on = "x", run = "yank --cut", desc = "Cut" },
	{ on = "p", run = "paste",    desc = "Paste" },
	{ on = "P", run = "paste --force", desc = "Paste (overwrite)" },
	{ on = "Y", run = "unyank",   desc = "Cancel yank" },
	{ on = "d", run = "remove",   desc = "Trash" },
	{ on = "D", run = "remove --permanently", desc = "Delete permanently" },
	{ on = "a", run = "create",                      desc = "Create file/dir" },
	{ on = "r", run = "rename --cursor=before_ext",  desc = "Rename" },
	{ on = ";", run = "shell --interactive",         desc = "Shell command" },
	{ on = ":", run = "shell --block --interactive", desc = "Shell (block)" },
	{ on = ".", run = "hidden toggle",               desc = "Toggle hidden" },
	{ on = "s", run = "search --via=fd",             desc = "Search (fd)" },
	{ on = "S", run = "search --via=rg",             desc = "Search (rg)" },
	{ on = "z", run = "plugin fzf",                  desc = "Fzf jump" },
	{ on = "Z", run = "plugin zoxide",               desc = "Zoxide jump" },

	{ on = "f", run = "filter --smart", desc = "Filter files" },
	{ on = "/", run = "find --smart",            desc = "Find next" },
	{ on = "?", run = "find --previous --smart", desc = "Find previous" },
	{ on = "n", run = "find_arrow",              desc = "Next found" },
	{ on = "N", run = "find_arrow --previous",   desc = "Previous found" },

	{ on = "t", run = "tab_create --current", desc = "New tab" },
	{ on = "[", run = "tab_switch -1 --relative", desc = "Previous tab" },
	{ on = "]", run = "tab_switch 1 --relative",  desc = "Next tab" },
	{ on = "w", run = "tasks:show", desc = "Task manager" },
	{ on = "~", run = "help", desc = "Help" },
]

[tasks]
keymap = [
	{ on = "<Esc>", run = "close", desc = "Close" },
	{ on = "k", run = "arrow prev", desc = "Previous task" },
	{ on = "j", run = "arrow next", desc = "Next task" },
	{ on = "<Enter>", run = "inspect", desc = "Inspect" },
	{ on = "x",       run = "cancel",  desc = "Cancel" },
]

[input]
keymap = [
	{ on = "<C-c>",   run = "close",          desc = "Cancel" },
	{ on = "<Enter>", run = "close --submit", desc = "Submit" },
	{ on = "<Esc>",   run = "escape",         desc = "Back to normal" },

	{ on = "i", run = "insert",                    desc = "Insert mode" },
	{ on = "I", run = [ "move first-char", "insert" ], desc = "Insert at BOL" },
	{ on = "a", run = "insert --append",           desc = "Append mode" },
	{ on = "A", run = [ "move eol", "insert --append" ], desc = "Append at EOL" },

	{ on = "h", run = "move -1", desc = "Left" },
	{ on = "l", run = "move 1",  desc = "Right" },
	{ on = "b", run = "backward",  desc = "Word back" },
	{ on = "w", run = "forward",   desc = "Word forward" },

	{ on = "0", run = "move bol", desc = "BOL" },
	{ on = "$", run = "move eol", desc = "EOL" },

	{ on = "<Backspace>", run = "backspace",         desc = "Delete before" },
	{ on = "<Delete>",    run = "backspace --under", desc = "Delete under" },

	{ on = "u",     run = "undo", desc = "Undo" },
	{ on = "<C-r>", run = "redo", desc = "Redo" },
]
