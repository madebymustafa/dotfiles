# =============================================================================
#  Tmux configuration
# =============================================================================

# ─── Base settings ───────────────────────────────────────────────────────────

source-file ~/.tmux.reset.conf

set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

set -g prefix ^A
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position bottom
set -g default-terminal "${TERM}"
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# ─── fzf-url integration ────────────────────────────────────────────────────

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ─── Plugins ─────────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# ─── Plugin: floax ───────────────────────────────────────────────────────────

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# ─── Plugin: sessionx ────────────────────────────────────────────────────────

set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# ─── Plugin: continuum / resurrect ───────────────────────────────────────────

set -g @continuum-restore 'off'
set -g @resurrect-strategy-nvim 'session'

# ─── Theme: Catppuccin ───────────────────────────────────────────────────────

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'none'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_default_fill 'number'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(,),}"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_status_background "#{@thm_mantle}"

set -g status-left "#{E:@catppuccin_status_session}#[fg=#{@thm_mantle},bg=#{@thm_mantle}]█"
set -g status-right "#{E:@catppuccin_status_directory}"
set -g status-format[1] "PADDING LINE TEST"
set -g status-right-length 100
set -g status-left-length 100

# ─── Load plugins ────────────────────────────────────────────────────────────
# catppuccin loaded synchronously for immediate visual feedback (~4ms)
run '~/.tmux/plugins/tmux/catppuccin.tmux'
# custom window format (no per-window rounded separators)
set -gF window-status-format \
  "#[fg=#{@thm_crust},bg=#{@thm_overlay_2}] #{@catppuccin_window_number} #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #{@catppuccin_window_default_text}#[fg=#{@thm_mantle},bg=#{@thm_mantle}]  "
set -gF window-status-current-format \
  "#[fg=#{@thm_crust},bg=#{@thm_mauve}] #{@catppuccin_window_current_number} #[fg=#{@thm_fg},bg=#{@thm_surface_1}] #{@catppuccin_window_current_text}#[fg=#{@thm_mantle},bg=#{@thm_mantle}]  "
set -gF window-status-activity-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"
# remaining plugins loaded in background to keep startup fast
run -b 'for f in ~/.tmux/plugins/tmux-*/*.tmux ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux; do [ -f "$f" ] && "$f" >/dev/null 2>&1; done'
